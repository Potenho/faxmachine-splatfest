<div class="blobs" aria-hidden="true">
  <div class="blobs__item blobs__item--1"></div>
  <div class="blobs__item blobs__item--2"></div>
  <div class="blobs__item blobs__item--3"></div>
</div>

<main class="about">
  <div class="about__inner">
    <div class="about__lang">
      <app-lang-switcher />
    </div>

    <header class="about__header">
      <div class="about__eyebrow">
        <svg class="about__eyebrow-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0l1.5 4.7H14l-3.9 2.9 1.5 4.7L8 9.4l-3.6 2.9 1.5-4.7L2 4.7h4.5z"/>
        </svg>
        FAXMACHINE
      </div>

      <h1 class="about__title">
        {{ 'about.title' | transloco }}<br>
        <span class="about__title-accent">{{ 'about.subtitle' | transloco }}</span>
      </h1>
    </header>

    <div class="about__card">
      <div class="about__section">
        <div class="about__section-content">
          <p>
            {{ 'about.content' | transloco }}
          </p>
        </div>
      </div>

      <div class="about__section">
        <h2 class="about__section-title">
          <svg class="about__section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48c-1.37-.38-2.84-.38-4.21 0C9.27.65 8.09 1 8.09 1A5.07 5.07 0 0 0 8 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 12 18.13V22"/>
          </svg>
          {{ 'about.github' | transloco }}
        </h2>
        <div class="about__section-content">
          <div class="about__github-button">
            <a 
              href="https://github.com/Potenho/faxmachine-splatfest" 
              target="_blank" 
              rel="noopener noreferrer"
              class="github-btn"
            >
              <svg class="github-btn-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.21.68-.48 0-.24-.01-.87-.01-1.71-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .27.18.58.69.48A10.02 10.02 0 0 0 22 12c0-5.52-4.48-10-10-10z"/>
              </svg>
              {{ 'about.githubButton' | transloco }}
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="about__back">
      <button class="back-button" (click)="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        {{ 'about.backButton' | transloco }}
      </button>
    </div>
  </div>
</main>
