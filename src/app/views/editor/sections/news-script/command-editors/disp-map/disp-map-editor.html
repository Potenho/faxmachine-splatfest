<div class="cmd-form">

  <div class="field">
    <span class="field__label" id="dm-label">
      {{ 'editor.newsScript.commandEditor.fields.mapId' | transloco }}
    </span>
    <button
      type="button"
      class="stage-card"
      (click)="stagePicker().open()"
      aria-labelledby="dm-label"
    >
      <img
        [ngSrc]="'/assets/stages/' + selectedStage().id + '.webp'"
        [alt]="selectedStage().name"
        width="160"
        height="90"
        class="stage-card__img"
      />
      <span class="stage-card__name">
        {{ 'editor.generalSettings.rotation.stages.names.' + selectedStage().id | transloco }}
      </span>
      <span class="stage-card__edit-hint" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </span>
    </button>
  </div>

</div>

<app-stage-picker-modal (stageSelected)="selectStage($event)" />
