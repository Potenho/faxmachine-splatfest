<dialog
  #dialog
  class="stage-modal"
  aria-labelledby="stage-modal-title"
  (cancel)="close()"
  (click)="onBackdropClick($event)"
>
  <div class="stage-modal__header">
    <h2 id="stage-modal-title" class="stage-modal__title">
      {{ titleKey() | transloco }}
    </h2>
    <button
      type="button"
      class="stage-modal__close-btn"
      (click)="close()"
      [attr.aria-label]="'editor.generalSettings.rotation.stages.modal.closeAriaLabel' | transloco"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <ul class="stage-picker" role="list">
    @for (stage of allStages; track stage.id) {
      <li>
        <button
          type="button"
          class="stage-picker__item"
          (click)="select(stage.id)"
        >
          <img
            [ngSrc]="'/assets/stages/' + stage.id + '.webp'"
            [alt]="stageName(stage.id)"
            width="160"
            height="90"
            class="stage-picker__img"
          />
          <span class="stage-picker__name">
            {{ 'editor.generalSettings.rotation.stages.names.' + stage.id | transloco }}
          </span>
        </button>
      </li>
    }
  </ul>
</dialog>
